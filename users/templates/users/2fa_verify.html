{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
    <div class="content-section">
        <form method="POST">
            {% csrf_token %}
            <fieldset class="form-group">
                <legend class="border-bottom mb-4">BlackBox - Secondary Verification</legend>
                <div class="alert alert-info">
                    <strong>Two-Step Authentication Required:</strong> 
                    Please enter your 6-digit security code to access your account.
                </div>
                <div class="form-group">
                    <label>Security PIN</label>
                    <input type="text" name="otp" class="form-control" placeholder="Enter 6-digit code" maxlength="6" required autofocus>
                </div>
            </fieldset>
            <div class="form-group">
                <button class="btn btn-outline-info" type="submit">Verify Identity</button>
            </div>
        </form>
        <div class="border-top pt-3">
            <small class="text-muted">
                Need help? Contact the BlackBox Security Admin.
            </small>
        </div>
    </div>
{% endblock content %}
